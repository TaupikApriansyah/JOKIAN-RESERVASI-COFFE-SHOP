# Profile default untuk development lokal. Untuk deploy gunakan: --spring.profiles.active=prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.application.name=dikacoffeshop-coffeshop

spring.jackson.time-zone=Asia/Jakarta
spring.jackson.serialization.write-dates-as-timestamps=false

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Graceful shutdown agar server tidak putus mendadak saat restart/deploy.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# CORS dapat diubah lewat environment FRONTEND_ORIGINS, pisahkan dengan koma.
app.cors.allowed-origins=${FRONTEND_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.upload.dir=${UPLOAD_DIR:uploads}
